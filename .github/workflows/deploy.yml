name: Deploy

# Builds the web/worker images, pushes them to GHCR, then SSHes into the VM
# to pull and roll out. See docker-compose.prod.yml for how the VM picks up
# the GHCR images instead of building locally.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST           VM address (IP or hostname)
#   SSH_USER           SSH user on the VM
#   SSH_PRIVATE_KEY    private key matching a public key in the VM's authorized_keys
#   SSH_PORT           (optional) defaults to 22
#   DEPLOY_PATH        absolute path to this repo's clone on the VM (matches
#                      WorkingDirectory in ops/hiring-app.service)
#
# The VM itself needs (one-time, see ops/hiring-app.service and the README
# section it's documented in): `.env` in place, `docker login ghcr.io`, infra
# containers (postgres/redis/piston) already up, and the systemd unit
# installed + enabled. SSH_USER needs passwordless sudo for exactly
# `systemctl restart hiring-app.service` (see visudo line in the setup docs).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  check:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx tsc --noEmit
      - run: bun run lint

  build-and-push:
    name: Build & push (${{ matrix.target }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [web, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll out over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            # Pick up any compose/migration changes that shipped with this commit.
            git fetch origin main
            git checkout "$GITHUB_SHA"

            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile app"

            # Both tagged :latest in the build job — pull re-resolves the tag
            # to the new digest built just now.
            $COMPOSE pull

            # One-off migration run against production, ahead of restarting
            # web/worker, using the image that's about to go live.
            $COMPOSE run --rm --no-deps web bunx prisma migrate deploy

            # Hand the actual container lifecycle off to systemd, which is
            # what supervises web/worker on this box (see ops/hiring-app.service).
            sudo systemctl restart hiring-app.service
            sudo systemctl is-active --quiet hiring-app.service

            docker image prune -f
